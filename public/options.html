<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Garoon Schedule Extension Options</title>
  <script src="options.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", sans-serif;
      color: #4b4c52;
      background: #f5f5f7;
      margin: 0;
      padding: 1.5rem;
    }
    .options-page {
      max-width: 640px;
      margin: 0 auto;
    }
    .opt-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .opt-logo {
      width: 32px;
      height: 32px;
    }
    .opt-title {
      font-size: 1.25rem;
      margin: 0;
    }
    .card {
      background: #fcfdff;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    label {
      cursor: pointer;
    }
    .footer {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .primary-button {
      background: #0059ff;
      color: #fff;
      border: none;
      border-radius: 0.25rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
    }
    .saved {
      color: #6aac50;
    }
  </style>
</head>
<body>
  <div class="options-page">
    <header class="opt-header">
      <img class="opt-logo" src="icon/icon-128.png" role="presentation" alt="__MSG_ext_name__">
      <h1 class="opt-title">__MSG_options__</h1>
    </header>
    <form id="ext-options">
      <div class="card">
        <div class="card-title">__MSG_opt_schedule_view_title__</div>
        <div>
          <label>
            <input type="checkbox" name="shows-time-indicator">
            __MSG_opt_shows_time_indicator_label__
          </label>
        </div>
      </div>
      <footer class="footer">
        <button class="primary-button" type="submit">__MSG_save_options__</button>
        <span class="saved" hidden>__MSG_saved__</span>
      </footer>
    </form>
  </div>
</body>
</html>
